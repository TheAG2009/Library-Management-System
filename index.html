<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexLib | Advanced Library System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Notification Toast -->
    <div id="toast-container"></div>

    <!-- Auth Section -->
    <div id="auth-screen" class="view">
        <div class="auth-container">
            <div class="auth-box" id="login-box">
                <h1>NexLib Login</h1>
                <div class="tab-group">
                    <button class="tab-btn active" onclick="switchAuthTab('user')">User</button>
                    <button class="tab-btn" onclick="switchAuthTab('admin')">Admin</button>
                </div>
                
                <form id="login-form">
                    <input type="text" id="login-id" placeholder="ID (admin or Member ID)" required>
                    <input type="password" id="login-pass" placeholder="Password" required>
                    <button type="submit" class="main-btn">Login</button>
                </form>
                <p class="toggle-auth">Don't have an account? <a href="#" onclick="toggleAuthMode('register')">Register here</a></p>
            </div>

            <div class="auth-box hidden" id="register-box">
                <h1>Create Account</h1>
                <form id="register-form">
                    <input type="text" id="reg-name" placeholder="Full Name" required>
                    <input type="text" id="reg-id" placeholder="Choose unique ID" required>
                    <input type="password" id="reg-pass" placeholder="Create Password" required>
                    <button type="submit" class="main-btn">Sign Up</button>
                </form>
                <p class="toggle-auth">Already have an account? <a href="#" onclick="toggleAuthMode('login')">Login here</a></p>
            </div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="view hidden">
        <nav>
            <div class="nav-brand">NexLib Admin</div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </nav>
        <div class="dashboard-grid">
            <div class="sidebar">
                <div class="stat-card">
                    <h3 id="stat-total-books">0</h3>
                    <p>Total Books</p>
                </div>
                <div class="stat-card">
                    <h3 id="stat-total-users">0</h3>
                    <p>Members</p>
                </div>
            </div>
            <div class="main-content">
                <section class="card">
                    <h2>Add New Book</h2>
                    <form id="add-book-form" class="inline-form">
                        <input type="text" id="book-title" placeholder="Title" required>
                        <input type="text" id="book-author" placeholder="Author" required>
                        <input type="text" id="book-id" placeholder="Book ID" required>
                        <button type="submit">Add Book</button>
                    </form>
                </section>
                <section class="card">
                    <h2>Inventory Management</h2>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Title</th>
                                    <th>Author</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="admin-book-list"></tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <!-- User Dashboard -->
    <div id="user-dashboard" class="view hidden">
        <nav>
            <div class="nav-brand" id="user-welcome">Welcome</div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </nav>
        <div class="container">
            <section class="search-section">
                <input type="text" id="search-input" placeholder="Search by title or author..." onkeyup="handleSearch()">
            </section>

            <div class="user-grid">
                <div class="book-gallery">
                    <h2>Available Books</h2>
                    <div id="available-books-grid" class="grid-layout"></div>
                </div>
                <div class="my-books">
                    <h2>My Borrowed Books</h2>
                    <div id="my-books-list" class="list-layout"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/models.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/user.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
